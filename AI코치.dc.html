<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;800;900&display=swap">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: #070810; font-family: 'Pretendard', system-ui, sans-serif; -webkit-font-smoothing: antialiased; color:#E7ECF7; }
  a { text-decoration:none; color:inherit; }
  input:focus { border-color:#E7ECF7 !important; }
</style>
</helmet>

<div data-screen-label="AI코치" style="min-height:100vh; background:radial-gradient(120% 80% at 80% -10%, #141a36 0%, #070810 55%); padding:18px 18px 0;">
  <div style="max-width:1180px; margin:0 auto;">

    <!-- nav -->
    <nav style="position:sticky; top:18px; z-index:50; display:flex; align-items:center; justify-content:space-between; background:#13151d; border:1px solid #232734; border-radius:20px; padding:13px 16px 13px 22px; box-shadow:0 18px 40px -26px rgba(14,21,35,0.3);">
      <a href="허브.dc.html" style="display:flex; align-items:center; gap:12px;">
        <div style="width:30px; height:30px; border-radius:9px; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center;">
          <div style="width:13px; height:13px; border:2px solid #93A4E8; border-radius:50%; position:relative;"><div style="position:absolute; width:2px; height:5px; background:#93A4E8; left:50%; top:1px; transform:translateX(-50%);"></div></div>
        </div>
        <span style="font-size:16px; font-weight:700; letter-spacing:-0.01em;">데이터의 눈으로 그림 읽기</span>
      </a>
      <div style="display:flex; align-items:center; gap:26px;">
        <div style="display:flex; gap:22px; font-size:14px; font-weight:600;">
          <a href="허브.dc.html" style="color:#667080;" style-hover="color:#E7ECF7;">둘러보기</a>
          <a href="그림분석.dc.html" style="color:#667080;" style-hover="color:#E7ECF7;">분석 도구</a>
          <a href="전시.dc.html" style="color:#667080;" style-hover="color:#E7ECF7;">전시</a>
        </div>
        <div style="width:34px; height:34px; border-radius:50%; background:#2F6BE0; color:#fff; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700;">A</div>
      </div>
    </nav>

    <header style="padding:40px 6px 24px;">
      <a href="허브.dc.html" style="font-size:14px; font-weight:600; color:#667080;">← 둘러보기</a>
      <div style="font-family:'Orbitron',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.2em; color:#93A4E8; margin-bottom:6px;">AI COACH</div>
        <h1 style="font-size:40px; font-weight:800; letter-spacing:-0.03em; margin:10px 0 0;">AI 감상 코치</h1>
      <div style="font-size:15px; color:#667080; margin-top:8px;">정답을 주지 않습니다. 너의 선택에 이유를 붙이도록 질문을 건넵니다.</div>
    </header>

    <section style="display:grid; grid-template-columns:300px 1fr; gap:14px; padding-bottom:60px; align-items:start;">
      <!-- context -->
      <div style="background:#13151d; border:1px solid #232734; border-radius:22px; padding:18px; box-shadow:0 24px 50px -40px rgba(14,21,35,0.3);">
        <div style="display:flex; height:150px; border-radius:14px; overflow:hidden;">{{ thumb }}</div>
        <div style="font-size:16px; font-weight:700; margin-top:14px;">〈무제〉</div>
        <div style="font-size:13px; color:#667080; margin-top:2px;">지금 함께 보는 작품</div>
        <div style="display:flex; flex-wrap:wrap; gap:6px; margin-top:14px;">{{ dataChips }}</div>
      </div>

      <!-- chat -->
      <div style="background:#13151d; border:1px solid #232734; border-radius:22px; box-shadow:0 30px 60px -42px rgba(14,21,35,0.34); display:flex; flex-direction:column; min-height:520px;">
        <div style="padding:16px 22px; border-bottom:1px solid rgba(255,255,255,0.08); display:flex; align-items:center; gap:10px;">
          <div style="width:30px; height:30px; border-radius:9px; background:#3A4F7A; display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; font-weight:700;">AI</div>
          <div><div style="font-size:14px; font-weight:700;">감상 코치</div><div style="font-size:12px; color:#9AA6B6;">데이터를 근거로 질문해요</div></div>
        </div>
        <div style="flex:1; padding:22px; display:flex; flex-direction:column; gap:14px; overflow-y:auto;">{{ messages }}</div>
        <div style="padding:14px; border-top:1px solid rgba(255,255,255,0.08);">
          <div style="display:flex; flex-wrap:wrap; gap:7px; margin-bottom:12px;">{{ suggestions }}</div>
          <div style="display:flex; gap:10px;">
            <input value="{{ draft }}" onInput="{{ onInput }}" onKeyDown="{{ onKey }}" placeholder="생각을 적어보세요…" style="flex:1; background:rgba(255,255,255,0.05); border:1px solid #232734; border-radius:999px; padding:13px 18px; font-size:14.5px; font-family:inherit; color:#E7ECF7; outline:none;">
            <button onClick="{{ send }}" style="background:#2F6BE0; color:#fff; border:none; border-radius:999px; padding:0 22px; font-size:15px; font-weight:600; font-family:inherit; cursor:pointer;" style-hover="background:#1C2740;">보내기</button>
          </div>
        </div>
      </div>
    </section>

    <footer style="margin:4px 0 56px; position:relative; overflow:hidden; background:#0A0E26; border-radius:24px; padding:30px 34px;">
      <div style="position:absolute; left:-6%; bottom:-70%; width:440px; height:300px; filter:blur(70px); opacity:0.4; pointer-events:none; background:radial-gradient(50% 60% at 40% 50%, #2F6BE0, transparent 70%), radial-gradient(40% 50% at 72% 50%, #2FB6A8, transparent 72%);"></div>
      <div style="position:relative; display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap;">
        <div style="display:flex; align-items:center; gap:13px;">
          <div style="width:34px; height:34px; border-radius:10px; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center;">
            <div style="width:14px; height:14px; border:2px solid #93A4E8; border-radius:50%; position:relative;"><div style="position:absolute; width:2px; height:5px; background:#93A4E8; left:50%; top:1px; transform:translateX(-50%);"></div></div>
          </div>
          <div>
            <div style="font-size:14px; font-weight:700; color:#fff;">데이터의 눈으로 그림 읽기</div>
            <div style="font-size:11.5px; color:#7E89A8; letter-spacing:0.02em; margin-top:2px;">© 2025 Miran Hwang · Seoul Arts High School · Art Teacher</div>
          </div>
        </div>
        <div style="display:flex; gap:9px; flex-wrap:wrap;">
          <a href="허브.dc.html" style="background:rgba(255,255,255,0.06); color:#C2CBE0; border:1px solid rgba(255,255,255,0.1); border-radius:999px; padding:8px 15px; font-size:13px; font-weight:600; cursor:pointer;" style-hover="background:rgba(255,255,255,0.12);">둘러보기</a>
          <a href="그림분석.dc.html" style="background:rgba(255,255,255,0.06); color:#C2CBE0; border:1px solid rgba(255,255,255,0.1); border-radius:999px; padding:8px 15px; font-size:13px; font-weight:600; cursor:pointer;" style-hover="background:rgba(255,255,255,0.12);">분석 도구</a>
          <a href="전시.dc.html" style="background:rgba(255,255,255,0.06); color:#C2CBE0; border:1px solid rgba(255,255,255,0.1); border-radius:999px; padding:8px 15px; font-size:13px; font-weight:600; cursor:pointer;" style-hover="background:rgba(255,255,255,0.12);">전시</a>
          <a href="AI코치.dc.html" style="background:rgba(255,255,255,0.06); color:#C2CBE0; border:1px solid rgba(255,255,255,0.1); border-radius:999px; padding:8px 15px; font-size:13px; font-weight:600; cursor:pointer;" style-hover="background:rgba(255,255,255,0.12);">AI 코치</a>
        </div>
      </div>
    </footer>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    draft: '',
    msgs: [
      { who:'ai', text:'안녕하세요. 〈무제〉에서 가장 먼저 눈에 들어온 건 감청이 31%로 가장 큰 비중이라는 점이에요. 이 색을 이렇게 크게 쓴 이유가 있나요?' },
    ],
  };
  _qs = [
    '흥미롭네요. 그 감정을 명도(평균 0.71)는 어떻게 거들고 있다고 생각하세요?',
    '그렇다면 채도를 0.43으로 낮게 둔 선택은 그 의도와 어떻게 연결되나요?',
    '감지된 객체 12개 중 무엇을 가장 강조하고 싶었나요?',
    '만약 이 작품을 다시 그린다면, 어떤 데이터를 일부러 바꿔보고 싶나요?',
  ];
  _i = 0;

  send = () => {
    const t = this.state.draft.trim();
    if (!t) return;
    const q = this._qs[this._i % this._qs.length];
    this._i++;
    this.setState({ draft:'', msgs: [...this.state.msgs, { who:'me', text:t }, { who:'ai', text:q }] });
  };

  renderVals(){
    const museum = ['#182F49','#8FC0B5','#E6F5A6','#3A4F7A','#6E84B8'];
    const twb=[1.8,1,1.3,2.3];
    const thumb = React.createElement(React.Fragment,{}, museum.slice(0,4).map((c,i)=>
      React.createElement('div',{key:i,style:{flex:twb[i],background:c}})));

    const chips = ['감청 31%','채도 0.43','명도 0.71','객체 12','감정 0.90'];
    const dataChips = React.createElement(React.Fragment,{}, chips.map((c,i)=>
      React.createElement('div',{key:i,style:{fontSize:'12px',fontWeight:600,color:'#93A4E8',background:'rgba(255,255,255,0.06)',borderRadius:'999px',padding:'5px 10px'}},c)));

    const messages = React.createElement(React.Fragment,{}, this.state.msgs.map((m,i)=>{
      const me = m.who==='me';
      return React.createElement('div',{key:i,style:{display:'flex',justifyContent:me?'flex-end':'flex-start'}},
        React.createElement('div',{style:{
          maxWidth:'80%', fontSize:'14px', lineHeight:1.6, padding:'12px 16px',
          borderRadius: me?'16px 16px 4px 16px':'16px 16px 16px 4px',
          background: me?'#0E1523':'rgba(255,255,255,0.05)', color: me?'#fff':'#C2CBE0'}}, m.text));
    }));

    const sg = ['감정을 강조하려고요','잘 모르겠어요','우연이었어요'];
    const suggestions = React.createElement(React.Fragment,{}, sg.map((s,i)=>
      React.createElement('div',{key:i,onClick:()=>this.setState({draft:s}),style:{
        fontSize:'12.5px', fontWeight:600, color:'#51607A', background:'#13151d',
        border:'1px solid rgba(255,255,255,0.16)', borderRadius:'999px', padding:'7px 13px', cursor:'pointer'}}, s)));

    return {
      thumb, dataChips, messages, suggestions,
      draft: this.state.draft,
      onInput: (e)=>this.setState({draft:e.target.value}),
      onKey: (e)=>{ if(e.key==='Enter') this.send(); },
      send: this.send,
    };
  }
}
</script>
</body>
</html>
