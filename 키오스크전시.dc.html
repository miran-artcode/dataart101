<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;800;900&display=swap">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: #050610; font-family: 'Pretendard', system-ui, sans-serif; -webkit-font-smoothing: antialiased; color:#E7ECF7; }
  a { text-decoration:none; color:inherit; }
  @keyframes kioskFloat { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-10px); } }
</style>
</helmet>

<div data-screen-label="키오스크전시" style="min-height:100vh; background:radial-gradient(130% 90% at 50% -10%, #161d3e 0%, #050610 58%); padding:0;">

  <!-- top bar -->
  <div style="display:flex; align-items:center; justify-content:space-between; padding:22px 30px;">
    <div style="display:flex; align-items:center; gap:13px;">
      <div style="width:34px; height:34px; border-radius:10px; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center;">
        <div style="width:15px; height:15px; border:2px solid #93A4E8; border-radius:50%; position:relative;"><div style="position:absolute; width:2px; height:6px; background:#93A4E8; left:50%; top:1px; transform:translateX(-50%);"></div></div>
      </div>
      <div>
        <div style="font-size:15px; font-weight:700; color:#fff;">데이터의 눈으로 그림 읽기</div>
        <div style="font-size:11.5px; color:#7E89A8;">2학년 3반 · 데이터 아트 전시</div>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <div style="display:flex; align-items:center; gap:8px; font-size:13px; color:#9fb0d0;"><span style="width:8px; height:8px; border-radius:50%; background:#2FB6A8; box-shadow:0 0 10px #2FB6A8;"></span>키오스크 모드</div>
      <a href="전시.dc.html" style="font-size:13px; font-weight:600; color:#8794b0; border:1px solid rgba(255,255,255,0.16); border-radius:999px; padding:8px 15px;" style-hover="color:#fff;">전시실 나가기</a>
    </div>
  </div>

  <!-- main feature -->
  <div style="display:grid; grid-template-columns:1.4fr 1fr; gap:30px; align-items:center; padding:14px 50px 30px; max-width:1180px; margin:0 auto;">
    <div style="position:relative;">
      <div style="position:absolute; inset:-30px; filter:blur(70px); opacity:0.5; pointer-events:none; background:{{ glow }};"></div>
      <div style="position:relative; border-radius:24px; overflow:hidden; box-shadow:0 50px 100px -40px rgba(0,0,0,0.8); animation:kioskFloat 6s ease-in-out infinite;">
        <div style="display:flex; height:430px;">{{ featureArt }}</div>
      </div>
    </div>
    <div>
      <div style="font-family:'Orbitron',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.2em; color:#93A4E8;">NOW SHOWING · {{ counter }}</div>
      <h1 style="font-size:46px; font-weight:800; letter-spacing:-0.03em; margin:14px 0 0; line-height:1.05;">{{ title }}</h1>
      <div style="font-size:17px; color:#A9B8DC; margin-top:10px;">{{ author }} · {{ tool }}</div>
      <p style="font-size:15px; line-height:1.7; color:#9fb0d0; margin:20px 0 0; max-width:380px;">{{ statement }}</p>
      <div style="display:flex; gap:6px; margin-top:22px;">{{ palette }}</div>
      <div style="display:flex; align-items:center; gap:20px; margin-top:28px;">
        <div style="width:96px; height:96px; border-radius:16px; background:#fff; padding:9px; flex-shrink:0;">{{ qr }}</div>
        <div style="font-size:13.5px; color:#9fb0d0; line-height:1.6;">QR을 스캔하면<br>작품의 데이터 분석을<br>휴대폰에서 볼 수 있어요.</div>
      </div>
    </div>
  </div>

  <!-- controls + filmstrip -->
  <div style="max-width:1180px; margin:0 auto; padding:0 50px 40px;">
    <div style="display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;">
      <div style="display:flex; align-items:center; gap:12px;">
        <button onClick="{{ prev }}" style="width:48px; height:48px; border-radius:50%; border:1px solid rgba(255,255,255,0.16); background:rgba(255,255,255,0.06); color:#fff; font-size:18px; cursor:pointer;" style-hover="background:rgba(255,255,255,0.14);">←</button>
        <button onClick="{{ toggleAuto }}" style="border:none; border-radius:999px; padding:13px 22px; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer; background:{{ autoBg }}; color:{{ autoFg }};">{{ autoLabel }}</button>
        <button onClick="{{ next }}" style="width:48px; height:48px; border-radius:50%; border:1px solid rgba(255,255,255,0.16); background:rgba(255,255,255,0.06); color:#fff; font-size:18px; cursor:pointer;" style-hover="background:rgba(255,255,255,0.14);">→</button>
      </div>
      <div style="font-size:13px; color:#7E89A8;">{{ autoNote }}</div>
    </div>
    <div style="display:flex; gap:12px; margin-top:20px; overflow-x:auto; padding-bottom:6px;">{{ filmstrip }}</div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { idx:0, auto:true, t:0 };
  componentDidMount(){ this.timer=setInterval(()=>{ if(this.state.auto){ this.setState(s=>{ const nt=s.t+1; if(nt>=50){ return {t:0, idx:(s.idx+1)%this.works().length}; } return {t:nt}; }); } },100); }
  componentWillUnmount(){ clearInterval(this.timer); }
  works(){ return [
    {t:'〈비 오는 거리〉',a:'김민서',tool:'그림 분석',pal:[['#182F49',42],['#3A4F7A',16],['#6E84B8',24],['#8FC0B5',18]],s:'비 오는 날의 거리감을 감청으로 담았습니다. 채도를 일부러 낮춰 쓸쓸함을 키웠어요.',glow:'radial-gradient(50% 60% at 35% 40%, #3A4F7A, transparent 70%), radial-gradient(50% 60% at 70% 60%, #6E84B8, transparent 72%)'},
    {t:'〈엄마의 손〉',a:'최유진',tool:'색 군집 스튜디오',pal:[['#8FC0B5',24],['#E6F5A6',40],['#CFE0D6',22],['#3A4F7A',14]],s:'따뜻한 연두로 엄마의 손을 떠올렸습니다. K-means가 찾아준 다섯 색을 입자로 흩뿌렸어요.',glow:'radial-gradient(50% 60% at 35% 40%, #8FC0B5, transparent 70%), radial-gradient(50% 60% at 70% 60%, #E6F5A6, transparent 72%)'},
    {t:'〈도시의 밤〉',a:'정하늘',tool:'데이터 점 스튜디오',pal:[['#0A0820',40],['#0E0A2E',18],['#182F49',24],['#3A4F7A',18]],s:'도시의 인구 데이터를 점으로 옮겼습니다. 밤의 밀도를 어둠의 농도로 보이게 했어요.',glow:'radial-gradient(50% 60% at 35% 40%, #2F6BE0, transparent 70%), radial-gradient(50% 60% at 70% 60%, #5B4BD6, transparent 72%)'},
    {t:'〈빗소리의 색〉',a:'박서연',tool:'소리 스튜디오',pal:[['#3A4F7A',30],['#6E84B8',24],['#8FC0B5',26],['#CFE0D6',20]],s:'빗소리의 주파수를 색으로 바꿨습니다. 높은 음일수록 밝은 청록으로 빛나요.',glow:'radial-gradient(50% 60% at 35% 40%, #2FB6A8, transparent 70%), radial-gradient(50% 60% at 70% 60%, #8FC0B5, transparent 72%)'},
  ]; }
  renderVals(){
    const S=this.state, works=this.works(), W=works[S.idx];
    const seg=(arr)=>arr.map((p,i)=>React.createElement('div',{key:i,style:{flex:p[1],background:p[0]}}));
    const featureArt=React.createElement(React.Fragment,{}, seg(W.pal));
    const palette=React.createElement(React.Fragment,{}, W.pal.map((p,i)=>React.createElement('div',{key:i,style:{flex:p[1],height:'28px',borderRadius:'6px',background:p[0]}})));

    // QR (deterministic pattern)
    const cells=[]; for(let y=0;y<11;y++){ for(let x=0;x<11;x++){ const corner=(x<3&&y<3)||(x>7&&y<3)||(x<3&&y>7); const on= corner ? !((x===1||x===9)&&(y===1)) && !((y===1||y===9)&&(x===1)) ? (Math.abs(x- (x<3?1:9))<=1 && Math.abs(y-1)<=1) || (x=== (x<3?1:9) ) : true : (Math.sin((x*7+y*13+S.idx*5))>0.1); cells.push(React.createElement('div',{key:y*11+x,style:{background:on?'#0E1523':'transparent'}})); } }
    const qr=React.createElement('div',{style:{width:'100%',height:'100%',display:'grid',gridTemplateColumns:'repeat(11,1fr)',gridTemplateRows:'repeat(11,1fr)'}}, cells);

    const filmstrip=React.createElement(React.Fragment,{}, works.map((w,i)=>
      React.createElement('div',{key:i,onClick:()=>this.setState({idx:i,t:0}),style:{flex:'0 0 auto',width:'150px',cursor:'pointer',borderRadius:'14px',overflow:'hidden',border:'2px solid '+(S.idx===i?'#2F6BE0':'transparent'),opacity:S.idx===i?1:0.6,transition:'all .2s ease'}},[
        React.createElement('div',{key:'a',style:{display:'flex',height:'84px'}}, seg(w.pal)),
        React.createElement('div',{key:'m',style:{background:'#13151d',padding:'9px 11px'}},[
          React.createElement('div',{key:'t',style:{fontSize:'12.5px',fontWeight:700,color:'#fff',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},w.t),
          React.createElement('div',{key:'a',style:{fontSize:'11px',color:'#8794b0',marginTop:'2px'}},w.a),
        ]),
      ])));

    return { glow:W.glow, featureArt, counter:(S.idx+1)+' / '+works.length, title:W.t, author:W.a, tool:W.tool, statement:W.s, palette, qr,
      prev:()=>this.setState(s=>({idx:(s.idx-1+works.length)%works.length,t:0})), next:()=>this.setState(s=>({idx:(s.idx+1)%works.length,t:0})),
      toggleAuto:()=>this.setState(s=>({auto:!s.auto})), autoLabel:S.auto?'❚❚ 자동 순환':'▶ 자동 재생', autoBg:S.auto?'#2F6BE0':'rgba(255,255,255,0.06)', autoFg:S.auto?'#fff':'#E7ECF7',
      autoNote:S.auto?'5초마다 다음 작품으로 넘어갑니다':'수동 모드 · 화살표로 넘기세요', filmstrip };
  }
}
</script>
</body>
</html>
