<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html,body{margin:0;background:#cfd8e6;font-family:system-ui,sans-serif;}
  .lab{font:600 13px system-ui;padding:6px 10px;color:#0E1523;background:#fff;display:inline-block;margin:10px;border-radius:8px;}
  .frame{background:#fff;margin:0 10px 18px;box-shadow:0 6px 20px rgba(0,0,0,.2);overflow:hidden;}
  iframe{border:0;display:block;}
</style>
</head>
<body>
<div id="lab" class="lab"></div>
<div class="frame" id="wrap"><iframe id="f" src="site/index.html"></iframe></div>
<script>
  const f = document.getElementById('f');
  const wrap = document.getElementById('wrap');
  const lab = document.getElementById('lab');
  const PREVIEW = 920;            // approx preview width
  window.setView = function(w, h, src){
    if(src) f.src = src;
    f.style.width = w + 'px';
    f.style.height = h + 'px';
    const scale = Math.min(1, PREVIEW / w);
    f.style.transform = 'scale(' + scale + ')';
    f.style.transformOrigin = 'top left';
    wrap.style.width = (w*scale) + 'px';
    wrap.style.height = (h*scale) + 'px';
    lab.textContent = (src||f.src.split('/').pop()) + '  @  ' + w + ' × ' + h + '   (scale ' + scale.toFixed(2) + ')';
  };
  setView(1280, 900);
</script>
</body>
</html>
