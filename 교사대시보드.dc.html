<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;800;900&display=swap">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: #f6fbff; font-family: 'Pretendard', system-ui, sans-serif; -webkit-font-smoothing: antialiased; color:#0E1523; }
  a { text-decoration:none; color:inherit; }
</style>
</helmet>

<div data-screen-label="교사대시보드" style="min-height:100vh; background:#f6fbff; padding:18px 18px 0;">
  <div style="max-width:1180px; margin:0 auto;">

    <!-- nav -->
    <nav style="position:sticky; top:18px; z-index:50; display:flex; align-items:center; justify-content:space-between; background:#fff; border:1px solid #E4EAF2; border-radius:20px; padding:13px 16px 13px 22px; box-shadow:0 18px 40px -26px rgba(14,21,35,0.3);">
      <a href="허브.dc.html" style="display:flex; align-items:center; gap:12px;">
        <div style="width:30px; height:30px; border-radius:9px; background:#0E1523; display:flex; align-items:center; justify-content:center;">
          <div style="width:13px; height:13px; border:2px solid #f6fbff; border-radius:50%; position:relative;"><div style="position:absolute; width:2px; height:5px; background:#f6fbff; left:50%; top:1px; transform:translateX(-50%);"></div></div>
        </div>
        <span style="font-size:16px; font-weight:700; letter-spacing:-0.01em;">데이터의 눈으로 그림 읽기</span>
      </a>
      <div style="display:flex; align-items:center; gap:26px;">
        <div style="display:flex; gap:22px; font-size:14px; font-weight:600;">
          <span style="color:#0E1523;">대시보드</span>
          <a href="전시.dc.html" style="color:#667080;" style-hover="color:#0E1523;">전시</a>
        </div>
        <div style="display:flex; align-items:center; gap:9px;">
          <span style="font-size:13px; font-weight:600; color:#3A4F7A;">교사</span>
          <div style="width:34px; height:34px; border-radius:50%; background:#3A4F7A; color:#fff; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700;">T</div>
        </div>
      </div>
    </nav>

    <!-- header -->
    <header style="padding:40px 6px 24px;">
      <div style="font-size:14px; font-weight:600; color:#3A4F7A;">황미란 선생님 · 2학년 3반</div>
      <div style="font-family:'Orbitron',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.2em; color:#3A4F7A; margin-top:12px;">DASHBOARD</div>
      <h1 style="font-size:42px; font-weight:800; letter-spacing:-0.03em; margin:6px 0 0;">교사 대시보드</h1>
    </header>

    <!-- stats -->
    <section style="display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px;">
      {{ stats }}
    </section>

    <!-- main: roster + distribution -->
    <section style="display:grid; grid-template-columns:1fr 320px; gap:14px; margin-top:14px; align-items:start;">

      <div style="background:#fff; border:1px solid #E4EAF2; border-radius:22px; padding:8px 24px 16px; box-shadow:0 24px 50px -40px rgba(14,21,35,0.3);">
        <div style="display:flex; justify-content:space-between; align-items:center; padding:18px 0 8px;">
          <div style="font-size:17px; font-weight:700;">학생 진행 현황</div>
          <div style="font-size:13px; color:#3A4F7A; font-weight:600; cursor:pointer;">전체 보기 →</div>
        </div>
        <div style="display:grid; grid-template-columns:1.4fr 1.6fr 1fr 80px; gap:14px; padding:10px 0; border-bottom:1px solid #EEF2F7; font-size:12px; font-weight:700; color:#9AA6B6; letter-spacing:0.04em;">
          <div>학생</div><div>진행 단계</div><div>최근 작품</div><div style="text-align:right;">피드백</div>
        </div>
        {{ roster }}
      </div>

      <div style="display:flex; flex-direction:column; gap:14px;">
        <div style="background:#fff; border:1px solid #E4EAF2; border-radius:22px; padding:22px; box-shadow:0 24px 50px -40px rgba(14,21,35,0.3);">
          <div style="font-size:15px; font-weight:700;">학급 색 경향</div>
          <div style="font-size:13px; color:#667080; margin-top:3px;">제출 작품의 평균 색 군집</div>
          <div style="display:flex; height:16px; border-radius:8px; overflow:hidden; margin-top:16px;">{{ classBar }}</div>
          <div style="margin-top:14px; display:flex; flex-direction:column; gap:8px;">{{ classList }}</div>
        </div>
        <div style="background:#dfeafe; border-radius:22px; padding:22px;">
          <div style="font-size:15px; font-weight:700; color:#0E1523;">검토 대기</div>
          <div style="font-size:40px; font-weight:800; letter-spacing:-0.03em; margin-top:6px; font-variant-numeric:tabular-nums;">7</div>
          <div style="font-size:13px; color:#51607A;">새 제출물이 피드백을 기다립니다.</div>
          <button style="margin-top:16px; width:100%; background:#0E1523; color:#fff; border:none; border-radius:12px; padding:13px; font-size:14.5px; font-weight:700; font-family:inherit; cursor:pointer;" style-hover="transform:translateY(-1px);">검토 시작 →</button>
        </div>
      </div>
    </section>

    <footer style="margin:48px 0 56px; position:relative; overflow:hidden; background:#0A0E26; border-radius:24px; padding:30px 34px;">
      <div style="position:absolute; left:-6%; bottom:-70%; width:440px; height:300px; filter:blur(70px); opacity:0.4; pointer-events:none; background:radial-gradient(50% 60% at 40% 50%, #2F6BE0, transparent 70%), radial-gradient(40% 50% at 72% 50%, #2FB6A8, transparent 72%);"></div>
      <div style="position:relative; display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap;">
        <div style="display:flex; align-items:center; gap:13px;">
          <div style="width:34px; height:34px; border-radius:10px; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center;">
            <div style="width:14px; height:14px; border:2px solid #93A4E8; border-radius:50%; position:relative;"><div style="position:absolute; width:2px; height:5px; background:#93A4E8; left:50%; top:1px; transform:translateX(-50%);"></div></div>
          </div>
          <div>
            <div style="font-size:14px; font-weight:700; color:#fff;">데이터의 눈으로 그림 읽기</div>
            <div style="font-size:11.5px; color:#7E89A8; letter-spacing:0.02em; margin-top:2px;">© 2025 Miran Hwang · Seoul Arts High School · Art Teacher</div>
          </div>
        </div>
        <div style="display:flex; gap:9px; flex-wrap:wrap;">
          <a href="허브.dc.html" style="background:rgba(255,255,255,0.06); color:#C2CBE0; border:1px solid rgba(255,255,255,0.1); border-radius:999px; padding:8px 15px; font-size:13px; font-weight:600;" style-hover="background:rgba(255,255,255,0.12);">허브</a>
          <a href="전시.dc.html" style="background:rgba(255,255,255,0.06); color:#C2CBE0; border:1px solid rgba(255,255,255,0.1); border-radius:999px; padding:8px 15px; font-size:13px; font-weight:600;" style-hover="background:rgba(255,255,255,0.12);">전시</a>
        </div>
      </div>
    </footer>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals(){
    const statData = [['28','참여 학생'],['64','제출 작품'],['52','분석 완료'],['7','피드백 대기']];
    const stats = React.createElement(React.Fragment,{}, statData.map((d,i)=>
      React.createElement('div',{key:i,style:{background:'#fff',border:'1px solid #E4EAF2',borderRadius:'20px',padding:'24px',boxShadow:'0 22px 46px -38px rgba(14,21,35,0.3)'}},[
        React.createElement('div',{key:'n',style:{fontSize:'40px',fontWeight:800,letterSpacing:'-0.03em',fontVariantNumeric:'tabular-nums'}},d[0]),
        React.createElement('div',{key:'l',style:{fontSize:'13.5px',color:'#667080',marginTop:'4px'}},d[1]),
      ])));

    const stage = (label,pct,color)=>React.createElement('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},[
      React.createElement('div',{key:'b',style:{flex:1,height:'7px',borderRadius:'4px',background:'#EAF0F7',overflow:'hidden'}},
        React.createElement('div',{style:{width:pct+'%',height:'100%',borderRadius:'4px',background:color}})),
      React.createElement('div',{key:'l',style:{fontSize:'12.5px',color:'#51607A',width:'52px'}},label),
    ]);
    const students = [
      ['김민서','출품','#0E1523',100,[['#182F49',2],['#3A4F7A',1.2],['#8FC0B5',1.6]]],
      ['이준','재창조','#3A4F7A',66,[['#3A4F7A',1.4],['#E6F5A6',2],['#CFE0D6',1]]],
      ['박서연','분석','#8FC0B5',40,[['#E6F5A6',1],['#8FC0B5',1.6],['#182F49',2]]],
      ['정하늘','출품','#0E1523',100,[['#0E0A2E',2.2],['#182F49',1],['#3A4F7A',1.3]]],
      ['최유진','재창조','#3A4F7A',70,[['#8FC0B5',1.2],['#E6F5A6',1],['#CFE0D6',2]]],
      ['한도윤','분석','#8FC0B5',35,[['#8FC0B5',1.6],['#E6F5A6',2.2],['#6E84B8',1]]],
    ];
    const roster = React.createElement(React.Fragment,{}, students.map((s,i)=>
      React.createElement('div',{key:i,style:{display:'grid',gridTemplateColumns:'1.4fr 1.6fr 1fr 80px',gap:'14px',alignItems:'center',padding:'14px 0',borderBottom: i<students.length-1?'1px solid #F1F4F9':'none'}},[
        React.createElement('div',{key:'s',style:{display:'flex',alignItems:'center',gap:'10px'}},[
          React.createElement('div',{key:'av',style:{width:'30px',height:'30px',borderRadius:'50%',background:s[4][0][0],color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',fontWeight:700}},s[0][0]),
          React.createElement('div',{key:'nm',style:{fontSize:'14.5px',fontWeight:600}},s[0]),
        ]),
        React.createElement('div',{key:'st'}, stage(s[1],s[3],s[2])),
        React.createElement('div',{key:'w',style:{display:'flex',height:'30px',width:'72px',borderRadius:'7px',overflow:'hidden'}}, s[4].map((seg,j)=>
          React.createElement('div',{key:j,style:{flex:seg[1],background:seg[0]}}))),
        React.createElement('div',{key:'f',style:{justifySelf:'end'}},
          React.createElement('button',{style:{background:'#EAF1FB',color:'#3A4F7A',border:'none',borderRadius:'999px',padding:'7px 13px',fontSize:'12.5px',fontWeight:700,fontFamily:'inherit',cursor:'pointer'}},'쓰기')),
      ])));

    const pal=['#182F49','#8FC0B5','#E6F5A6','#3A4F7A','#6E84B8'];
    const pcts=[34,24,18,14,10];
    const nm=['감청','세이지','연두','회청','청보라'];
    const classBar = React.createElement(React.Fragment,{}, pal.map((c,i)=>
      React.createElement('div',{key:i,style:{width:pcts[i]+'%',background:c}})));
    const classList = React.createElement(React.Fragment,{}, pal.map((c,i)=>
      React.createElement('div',{key:i,style:{display:'flex',alignItems:'center',gap:'9px'}},[
        React.createElement('div',{key:'s',style:{width:'14px',height:'14px',borderRadius:'4px',background:c}}),
        React.createElement('div',{key:'n',style:{fontSize:'13px',flex:1}},nm[i]),
        React.createElement('div',{key:'p',style:{fontSize:'13px',fontWeight:700,fontVariantNumeric:'tabular-nums'}},pcts[i]+'%'),
      ])));

    return { stats, roster, classBar, classList };
  }
}
</script>
</body>
</html>
